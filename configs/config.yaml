# Sensor-Free Mango Digital Twin — project configuration
# All coordinates, dates, file paths, and risk thresholds live here so
# nothing is hardcoded inside the pipeline scripts.

study_area:
  name: "Muthukur / Peddapanjani mango-growing area"
  district: "Chittoor"
  state: "Andhra Pradesh"
  country: "India"
  latitude: 13.294219
  longitude: 78.624294

historical_weather:
  source: "NASA POWER"
  start_date: "2025-01-01"   # YYYY-MM-DD, converted to YYYYMMDD internally
  end_date: null              # null = today
  parameters: ["T2M", "T2M_MAX", "T2M_MIN", "RH2M", "PRECTOTCORR", "ALLSKY_SFC_SW_DWN", "WS2M"]

forecast_weather:
  source: "Open-Meteo"
  past_days: 7
  forecast_days: 7
  timezone: "Asia/Kolkata"

soil:
  source: "SoilGrids"
  properties: ["sand", "silt", "clay", "phh2o", "soc", "bdod", "cec"]
  depths: ["0-5cm", "5-15cm", "15-30cm"]

# Sentinel-2 / Google Earth Engine settings.
# SETUP ONLY at this stage — these values describe the area of interest and
# imagery filters that will be used once remote-sensing fetching is built.
# No satellite data is downloaded yet just by having this section present.
remote_sensing:
  gee_project_id: "mango-digital-twin"  # Google Cloud project tied to your
                                          # Earth Engine account (created during
                                          # `earthengine authenticate`). Required
                                          # by ee.Initialize() as of mid-2024+.
  latitude: 13.294219     # defaults to the same point as study_area
  longitude: 78.624294
  buffer_radius_m: 500    # optional buffer around the point, in meters, to
                            # define a small area of interest instead of a
                            # single pixel
  start_date: "2025-01-01"   # YYYY-MM-DD, Sentinel-2 imagery search window start
  end_date: null              # null = today
  cloud_threshold_percent: 20  # skip Sentinel-2 scenes with more cloud cover
                                 # than this (CLOUDY_PIXEL_PERCENTAGE)

# FAO-56 soil-water balance settings (standalone prep phase — see
# src/water_balance/fao56_water_balance.py). Used to compute reference
# evapotranspiration (ET0) and a daily root-zone soil-water balance. Not
# wired into main.py or the dashboard yet; this section only documents the
# assumptions the standalone script reads.
fao56:
  elevation_m: 150  # Approximate elevation for the Chittoor district plains
                      # around Muthukur/Peddapanjani. This is a documented
                      # assumption, not a surveyed value for the exact
                      # coordinates above — refine if precise DEM/elevation
                      # data becomes available. Used only for atmospheric
                      # pressure in the ET0 psychrometric constant, which is
                      # not very sensitive to small elevation errors.
  root_depth_m: 1.2   # Effective root zone depth for a mature mango tree.
                        # FAO-56 Table 22 lists mango at 1.2-2.0 m; using the
                        # conservative low end until a phenology-aware
                        # (planting age / canopy size) model exists.
  depletion_fraction_p: 0.50  # Default soil-water depletion fraction at
                                # which water stress begins (FAO-56 Table 22
                                # typical value for fruit trees, ~0.50).
  kc_constant: 0.75  # Placeholder, NON-phenology-aware crop coefficient for
                       # a mature mango orchard, used for every day in the
                       # date range. Real Kc varies by growth stage
                       # (flowering, fruit set, fruit development, maturity,
                       # post-harvest) — see ROADMAP.md Phase 5. Until that
                       # phenology model exists, this constant is a
                       # documented simplification, not a precise value.
  albedo: 0.23  # FAO-56 reference crop albedo (Chapter 4), used in the net
                  # shortwave radiation term of the ET0 equation.
  # Stage-aware Kc values, used ONLY by the new standalone script
  # src/water_balance/fao56_phenology_water_balance.py (Phase 5, first
  # version). These are FIRST-PASS ASSUMPTIONS based on general mango/FAO-56
  # guidance, NOT field-calibrated for this specific orchard or cultivar.
  # The original kc_constant above is left untouched and still used by the
  # original src/water_balance/fao56_water_balance.py.
  phenology_kc_stages:
    "Flower induction / pre-flowering": 0.65
    "Flowering": 0.75
    "Fruit set": 0.85
    "Fruit development": 0.90
    "Maturity / harvest": 0.80
    "Rest / vegetative phase": 0.60

# Mango phenology calendar settings (standalone prep phase — see
# src/phenology/mango_phenology_calendar.py). This is a SIMPLIFIED, REGIONAL
# (Andhra Pradesh / South India) seasonal calendar, not calibrated to a
# specific cultivar and not based on field observations at this study site.
# It assigns one growth stage per calendar date using fixed month/day
# boundaries below. Stage boundaries deliberately do not overlap — where the
# rough month ranges suggested in project planning notes overlapped (e.g.
# "flowering: Jan-Feb" and "fruit set: Feb-Mar"), a single cutover day was
# chosen and is documented in the script itself. Not wired into main.py, the
# FAO-56 water-balance script, or the dashboard yet.
phenology:
  region: "Andhra Pradesh / South India (generic mango calendar)"
  cultivar: "Not cultivar-specific"

paths:
  data_raw_dir: "data/raw"
  data_processed_dir: "data/processed"
  nasa_power_csv: "data/raw/muthukur_weather_nasa_power.csv"
  open_meteo_csv: "data/raw/muthukur_weather_open_meteo.csv"
  soilgrids_csv: "data/raw/muthukur_soilgrids.csv"
  historical_risk_csv: "data/processed/muthukur_weather_risk_scores.csv"
  forecast_risk_csv: "data/processed/muthukur_open_meteo_forecast_risk.csv"
  sentinel2_daily_csv: "data/processed/muthukur_sentinel2_daily_indices.csv"
  sentinel2_timeseries_csv: "data/processed/muthukur_sentinel2_index_timeseries.csv"
  combined_feature_table_csv: "data/processed/muthukur_combined_feature_table.csv"
  fao56_water_balance_csv: "data/processed/muthukur_fao56_water_balance.csv"
  mango_phenology_calendar_csv: "data/processed/muthukur_mango_phenology_calendar.csv"
  fao56_phenology_water_balance_csv: "data/processed/muthukur_fao56_phenology_water_balance.csv"
  fao56_model_comparison_csv: "data/processed/muthukur_fao56_model_comparison.csv"
  fao56_model_comparison_summary_md: "data/processed/muthukur_fao56_model_comparison_summary.md"
  forecast_aware_irrigation_advisory_csv: "data/processed/muthukur_forecast_aware_irrigation_advisory.csv"
  pipeline_run_metadata_json: "data/processed/pipeline_run_metadata.json"

risk_thresholds:
  classification:
    high: 0.70
    medium: 0.40
  irrigation:
    rainfall_7day_low_mm: 10
    rainfall_7day_medium_mm: 25
    temp_max_high_c: 35
    temp_max_medium_c: 32
    solar_radiation_high_mj_m2: 22
    solar_radiation_medium_mj_m2: 18
    et0_high_mm: 6
    et0_medium_mm: 4.5
  heat_stress:
    temp_max_extreme_c: 40
    temp_max_high_c: 37
    temp_max_medium_c: 35
    temp_max_low_c: 32
    temp_avg_warm_c: 30
  disease:
    humidity_high_percent: 85
    humidity_medium_percent: 75
    humidity_low_percent: 65
    temp_avg_favorable_min_c: 24
    temp_avg_favorable_max_c: 30
    temp_avg_marginal_min_c: 20
    rainfall_3day_high_mm: 20
    rainfall_3day_medium_mm: 5
