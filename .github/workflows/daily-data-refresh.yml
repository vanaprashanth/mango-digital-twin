name: Daily Data Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"   # 02:30 UTC = ~08:00 IST

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline (weather + Sentinel-2 refresh if GEE credentials available)
        # --skip-soil-fetch  : reuse cached SoilGrids CSV (static data, avoids API timeouts)
        # --refresh-sentinel2: attempt Sentinel-2 GEE fetch; skips gracefully if
        #                      GEE_SERVICE_ACCOUNT_KEY secret is not configured.
        # To enable Sentinel-2 refresh: add a repository secret named
        # GEE_SERVICE_ACCOUNT_KEY containing the full JSON of a Google Cloud
        # service account key that has Earth Engine API access.
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
        run: python main.py --skip-soil-fetch --refresh-sentinel2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit refreshed data if changed
        run: |
          git add data/raw data/processed
          if git diff --cached --quiet; then
            echo "No data changes detected — skipping commit."
          else
            git commit -m "Data: automated daily refresh"
            git push
          fi
