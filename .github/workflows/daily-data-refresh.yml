name: Daily Data Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"   # 02:30 UTC = ~08:00 IST

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py --skip-soil-fetch

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit refreshed data if changed
        run: |
          git add data/raw data/processed
          if git diff --cached --quiet; then
            echo "No data changes detected — skipping commit."
          else
            git commit -m "Data: automated daily refresh"
            git push
          fi
